name: Build ESP32-S3 Firmware

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target:
        description: 'ESP32 target'
        required: true
        default: 'esp32s3'
        type: choice
        options:
          - esp32
          - esp32s3
          - esp32c3

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      
      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.1
          target: esp32s3
      
      - name: Build firmware for ESP32-S3
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py fullclean
          idf.py build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: esp32s3-firmware-build
          path: build/
          retention-days: 30
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: firmware-esp32s3
          path: build/xiaozhi-esp32.bin
          retention-days: 5